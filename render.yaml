services:
  - type: web
    name: face-recognition-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: face-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: face-db
    databaseName: face_recognition
    user: face_user
    plan: free
